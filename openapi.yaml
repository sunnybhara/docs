          items: {}
        request_id:
          type: string

    WebhookSuccessResponse:
      type: object
      required: [success, result, errors, request_id]
      properties:
        success:
          type: boolean
          const: true
        result:
          $ref: "#/components/schemas/WebhookEndpoint"
        errors:
          type: array
          maxItems: 0
          items: {}
        request_id:
          type: string

    WebhookListResponse:
      type: object
      required: [success, result, errors, request_id]
      properties:
        success:
          type: boolean
          const: true
        result:
          type: object
          properties:
            object:
              type: string
              const: list
            data:
              type: array
              items:
                $ref: "#/components/schemas/WebhookEndpoint"
        errors:
          type: array
          maxItems: 0
          items: {}
        request_id:
          type: string

    # --- Domain Objects ---

    ClassificationResult:
      type: object
      properties:
        text:
          type: string
          description: The original input text
        intent:
          type: string
          enum: [question, complaint, praise, suggestion, spam, other]
          description: Detected intent
        intent_confidence:
          type: number
          minimum: 0
          maximum: 1
        sentiment:
          type: string
          enum: [positive, negative, neutral, mixed]
        sentiment_confidence:
          type: number
          minimum: 0
          maximum: 1
        dialect:
          type: string
          enum: [gulf, egyptian, levantine, msa]
        dialect_confidence:
          type: number
          minimum: 0
          maximum: 1
        toxicity:
          type: string
          enum: [none, mild, moderate, severe]
        toxicity_confidence:
          type: number
          minimum: 0
          maximum: 1
        categories:
          type: array
          items:
            type: string
          description: "Content categories: engagement, support, feedback, spam"
        language:
          type: string
          enum: [ar, en, mixed]
        model:
          type: string
        cached:
          type: boolean

    TranslateResult:
      type: object
      required: [id, object, text, translated_text, source_language, target_language, tone, provider, model, fallback_used, cost_usd, credits_used, cached]
      properties:
        id:
          type: string
          description: Translation ID (trn_nw_xxx format)
        object:
          type: string
          const: translation
        text:
          type: string
          description: Original input text
        translated_text:
          type: string
          description: Translated output
        source_language:
          type: string
          enum: [ar, en]
        target_language:
          type: string
          enum: [ar, en]
        source_dialect:
          type: string
          nullable: true
          enum: [gulf, egyptian, levantine, msa]
          description: Detected dialect if source is Arabic
        target_dialect:
          type: string
          nullable: true
          enum: [gulf, egyptian, levantine, msa]
          description: Target dialect if target is Arabic
        tone:
          type: string
          enum: [formal, casual, social_media]
        provider:
          type: string
          description: "AI provider used (allam or claude)"
        model:
          type: string
        fallback_used:
          type: boolean
          description: Whether the fallback provider was used
        cached:
          type: boolean
        cost_usd:
          type: number
        credits_used:
          type: integer

    DetectResult:
      type: object
      required: [id, object, text, language, script, text_direction, word_count, fallback_used, cost_usd, credits_used, cached]
      properties:
        id:
          type: string
          description: Detection ID (det_nw_xxx format)
        object:
          type: string
          const: detection
        text:
          type: string
          description: The original input text
        language:
          type: string
          enum: [ar, en, mixed]
          description: Detected language
        dialect:
          type: string
          nullable: true
          enum: [gulf, egyptian, levantine, msa]
          description: Detected Arabic dialect. Null if not Arabic.
        dialect_confidence:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          description: Confidence score for dialect detection. Null if not Arabic.
        script:
          type: string
          enum: [arabic, latin, mixed]
          description: Script type
        text_direction:
          type: string
          enum: [rtl, ltr]
          description: Text direction
        word_count:
          type: integer
          description: Number of words in the input text
        fallback_used:
          type: boolean
          description: Always false for this endpoint (local detection only)
        cost_usd:
          type: number
        credits_used:
          type: integer
        cached:
          type: boolean

    ModerateResult:
      type: object
      required: [id, object, text, is_safe, verdict, flags, severity, severity_score, language, categories, category_scores, flagged_terms, model, provider, fallback_used, cost_usd, credits_used, cached]
      properties:
        id:
          type: string
          description: Moderation ID (mod_nw_xxx format)
        object:
          type: string
          const: moderation
        text:
          type: string
          description: The original input text
        is_safe:
          type: boolean
          description: Whether the content passed moderation
        verdict:
          type: string
          enum: [safe, flagged]
        flags:
          type: array
          items:
            type: string
          description: List of triggered category names
        severity:
          type: string
          enum: [none, low, medium, high]
        severity_score:
          type: number
          minimum: 0
          maximum: 1
        language:
          type: string
          enum: [ar, en, mixed]
        dialect:
          type: string
          nullable: true
          enum: [gulf, egyptian, levantine, msa]
        categories:
          $ref: "#/components/schemas/ModerationCategories"
        category_scores:
          $ref: "#/components/schemas/ModerationCategoryScores"
        flagged_terms:
          type: array
          items:
            type: string
          description: Specific problematic words/phrases found
        cleaned_text:
          type: string
          nullable: true
          description: Text with flagged terms replaced by ***. Null if safe.
        model:
          type: string
        provider:
          type: string
          description: "AI provider used (allam or claude)"
        fallback_used:
          type: boolean
          description: Whether the fallback provider was used
        cost_usd:
          type: number
        credits_used:
          type: integer
        cached:
          type: boolean

    ModerationCategories:
      type: object
      properties:
        profanity:
          type: boolean
        hate_speech:
          type: boolean
        harassment:
          type: boolean
        sexual:
          type: boolean
        spam:
          type: boolean
        self_harm:
          type: boolean
        violence:
          type: boolean

    ModerationCategoryScores:
      type: object
      properties:
        profanity:
          type: number
          minimum: 0
          maximum: 1
        hate_speech:
          type: number
          minimum: 0
          maximum: 1
        harassment:
          type: number
          minimum: 0
          maximum: 1
        sexual:
          type: number
          minimum: 0
          maximum: 1
        spam:
          type: number
          minimum: 0
          maximum: 1
        self_harm:
          type: number
          minimum: 0
          maximum: 1
        violence:
          type: number
          minimum: 0
          maximum: 1

    RubricResult:
      type: object
      properties:
        text:
          type: string
          description: The original input text
        category:
          type: string
          description: The top matching category from the rubric
        category_confidence:
          type: number
          minimum: 0
          maximum: 1
        scores:
          type: object
          additionalProperties:
            type: number
          description: Confidence scores for all rubric categories
        dialect:
          type: string
          enum: [gulf, egyptian, levantine, msa]
        dialect_confidence:
          type: number
          minimum: 0
          maximum: 1
        language:
          type: string
          enum: [ar, en, mixed]
        model:
          type: string
        cached:
          type: boolean

    ReplyResult:
      type: object
      properties:
        comment_id:
          type: string
          description: The comment that was replied to
        reply_text:
          type: string
          description: The generated reply text
        reply_dialect:
          type: string
          enum: [gulf, egyptian, levantine, msa]
          description: Dialect used in the reply
        tone:
          type: string
          enum: [friendly, professional, casual, formal]
          description: The tone used for the reply
        original_intent:
          type: string
          enum: [question, complaint, praise, suggestion, spam, other]
          description: Detected intent of the original comment
        original_dialect:
          type: string
          enum: [gulf, egyptian, levantine, msa]
          description: Detected dialect of the original comment

    ReportResult:
      type: object
      required: [id, object, tier, report_markdown, sections, comments_analyzed, cost_usd, credits_used]
      properties:
        id:
          type: string
          description: Report ID (rpt_nw_xxx format)
        object:
          type: string
          const: intelligence_report
        tier:
          type: string
          enum: [basic, pro]
        report_markdown:
          type: string
          description: |
            Full report as markdown. Percentages are tagged with COUNT
            (verified from data) or ESTIMATE (analyst judgement). Any
            percentage the model left untagged is stamped UNVERIFIED
            by post-processing.
        sections:
          type: object
          description: |
            Parsed report sections as JSON. Keys are stable across
            prompt versions via tolerant heading-to-key mapping.
            Unknown sections appear under a slugified key.
          additionalProperties:
            type: string
        comments_analyzed:
          type: integer
        cost_usd:
          type: number
        credits_used:
          type: integer

    FeedbackInput:
      type: object
      required: [request_id, field, expected_value]
      properties:
        request_id:
          type: string
          description: The request_id from the original classification response
        field:
          type: string
          enum: [intent, sentiment, dialect, toxicity, category]
          description: The field to correct
        expected_value:
          type: string
          description: The correct value the model should have returned
        comment:
          type: string
          description: Optional explanation of why this correction is needed

    FeedbackResult:
      type: object
      properties:
        feedback_id:
          type: string
        status:
          type: string
          enum: [accepted]
        message:
          type: string

    CommentItem:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        platform:
          type: string
          enum: [youtube, instagram, twitter, facebook]
        intent:
          type: string
          enum: [question, complaint, praise, suggestion, spam, other]
        sentiment:
          type: string
          enum: [positive, negative, neutral, mixed]
        dialect:
          type: string
          enum: [gulf, egyptian, levantine, msa]
        toxicity:
          type: string
          enum: [none, mild, moderate, severe]
        created_at:
          type: string
          format: date-time
        channel_id:
          type: string

    Pagination:
      type: object
      properties:
        has_more:
          type: boolean
        next_cursor:
          type: string
          nullable: true
        total_count:
          type: integer

    AnalyticsResult:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        total_comments:
          type: integer
        summary:
          type: object
          properties:
            intent:
              type: object
              additionalProperties:
                type: integer
            sentiment:
              type: object
              additionalProperties:
                type: integer
            dialect:
              type: object
              additionalProperties:
                type: integer
            toxicity:
              type: object
              additionalProperties:
                type: integer
        trends:
          type: array
          items:
            type: object
            properties:
              period:
                type: string
              total:
                type: integer
              sentiment_score:
                type: number
              top_intent:
                type: string

    HealthResult:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        version:
          type: string
        services:
          type: object
          properties:
            api:
              type: string
              enum: [operational, degraded, down]
            classification:
              type: string
              enum: [operational, degraded, down]
            database:
              type: string
              enum: [operational, degraded, down]
            cache:
              type: string
              enum: [operational, degraded, down]
        timestamp:
          type: string
          format: date-time

    UsageResult:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        total_requests:
          type: integer
        total_cost:
          type: number
          description: Total cost in USD
        cache_hit_rate:
          type: number
          minimum: 0
          maximum: 1
        by_endpoint:
          type: array
          items:
            type: object
            properties:
              endpoint:
                type: string
              requests:
                type: integer
              cost:
                type: number
              cache_hits:
                type: integer
              avg_latency_ms:
                type: integer
        balance:
          type: object
          properties:
            current:
              type: number
            credits_purchased:
              type: number
            credits_used:
              type: number

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        object:
          type: string
          const: webhook_endpoint
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        signing_secret:
          type: string
          description: HMAC signing secret (shown once at creation)
        active:
          type: boolean
        failure_count:
          type: integer
        created_at:
          type: string
          format: date-time

    # --- Error Envelope ---

    ErrorEnvelope:
      type: object
      required: [type, error, request_id]
      properties:
        type:
          type: string
          const: error
        error:
          type: object
          required: [type, code, message, display_message, param, doc_url, suggested_action]
          properties:
            type:
              type: string
              enum:
                - authentication_error
                - permission_error
                - rate_limit_error
                - invalid_request_error
                - not_found_error
                - api_error
            code:
              type: string
            message:
              type: string
            display_message:
              type: string
            param:
              type: string
              nullable: true
            doc_url:
              type: string
              format: uri
            suggested_action:
              type: string
        request_id:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            type: error
            error:
              type: invalid_request_error
              code: missing_field
              message: "`text` is required"
              display_message: "The required field `text` is missing."
              param: text
              doc_url: https://developers.trynawa.com/errors#missing_required_param
              suggested_action: "Include `text` in your request body."
            request_id: req_nw_a1b2c3d4e5f67890

    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            type: error
            error:
              type: authentication_error
              code: invalid_api_key
              message: API key not found
              display_message: The provided API key is not valid.
              param: Authorization
              doc_url: https://developers.trynawa.com/authentication
              suggested_action: Check your API key in the NAWA dashboard.
            request_id: req_nw_a1b2c3d4e5f67890

    PaymentRequired:
      description: Insufficient credits
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            type: error
            error:
              type: permission_error
              code: insufficient_credits
              message: Credit balance is $0.00
              display_message: Your account has insufficient credits.
              param: null
              doc_url: https://developers.trynawa.com/billing
              suggested_action: Purchase credits at trynawa.com/developers/keys.
            request_id: req_nw_a1b2c3d4e5f67890

    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            type: error
            error:
              type: rate_limit_error
              code: rate_limit_exceeded
              message: "Rate limit exceeded: minute_limit"
              display_message: You have exceeded the request rate limit for your plan.
              param: null
              doc_url: https://developers.trynawa.com/rate-limits
              suggested_action: Wait and retry, or upgrade your plan for higher limits.
            request_id: req_nw_a1b2c3d4e5f67890

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
