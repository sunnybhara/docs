openapi: 3.1.0
info:
  title: NAWA API
  version: 1.1.1
  description: |
    Arabic language intelligence API.
    تصنيف ذكي للمحتوى العربي  -  من الخليج إلى المغرب.

    NAWA classifies Arabic and English text with dialect detection, sentiment analysis,
    intent classification, translation, content moderation, and automated reply generation.
  contact:
    name: NAWA Support
    email: support@trynawa.com
    url: https://trynawa.com
  license:
    name: Proprietary
    url: https://trynawa.com/terms

servers:
  - url: https://api.trynawa.com/v1
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Classification
    description: Text classification endpoints
  - name: Translation
    description: Arabic-English translation
  - name: Detection
    description: Language and dialect detection
  - name: Moderation
    description: Content moderation
  - name: Reply
    description: Comment reply generation
  - name: Intelligence
    description: Audience intelligence reports
  - name: Feedback
    description: RLHF feedback ingestion
  - name: Comments
    description: Comment retrieval and filtering
  - name: Analytics
    description: Aggregated analytics
  - name: Usage
    description: API usage statistics
  - name: System
    description: Health and status
  - name: Webhooks
    description: Webhook management

paths:
  /classify:
    post:
      operationId: classify
      summary: Classify text
      description: |
        Classify Arabic or English text. Returns intent, sentiment, dialect, toxicity,
        and categories in a single API call. Supports semantic caching.
      tags: [Classification]
      x-nawa-cost: "$0.006"
      x-nawa-cache: true
      x-nawa-free: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 5000
                  description: The comment text to classify
                  examples:
                    - "متى الجزء الثاني؟"
                    - "ما شاء الله عليك، محتوى رهيب!"
                platform:
                  type: string
                  enum: [youtube, instagram, twitter, facebook]
                  description: Source platform for context-aware classification
                channel_id:
                  type: string
                  description: Your channel or account identifier for analytics grouping
                metadata:
                  type: object
                  description: Arbitrary key-value metadata to attach to the classification
            example:
              text: "متى الجزء الثاني؟"
              platform: "youtube"
              channel_id: "ch_123"
      responses:
        "200":
          description: Classification result
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Provider:
              $ref: "#/components/headers/X-NAWA-Provider"
            X-NAWA-Cache:
              $ref: "#/components/headers/X-NAWA-Cache"
            X-NAWA-Balance:
              $ref: "#/components/headers/X-NAWA-Balance"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifySuccessResponse"
              examples:
                gulf_question:
                  summary: Gulf Arabic question
                  value:
                    success: true
                    result:
                      text: "متى الجزء الثاني؟"
                      intent: question
                      intent_confidence: 0.97
                      sentiment: neutral
                      sentiment_confidence: 0.91
                      dialect: gulf
                      dialect_confidence: 0.95
                      toxicity: none
                      toxicity_confidence: 0.99
                      categories: ["engagement"]
                      language: ar
                      model: nagl-v1
                      cached: false
                    errors: []
                    request_id: req_nw_a1b2c3d4e5f67890
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /translate:
    post:
      operationId: translate
      summary: Translate text
      description: |
        Translate text between English and Arabic with dialect awareness.
        Generates culturally appropriate translations in Gulf, Egyptian, Levantine, or MSA Arabic.
        Falls back to Claude Haiku 4.5 if ALLaM is unavailable.
      tags: [Translation]
      x-nawa-cost: "$0.005"
      x-nawa-cache: true
      x-nawa-free: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, target]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 5000
                  description: Text to translate
                  examples:
                    - "Hello, how are you?"
                    - "وش رايكم بالمحتوى الجديد؟"
                source:
                  type: string
                  enum: [ar, en, auto]
                  default: auto
                  description: "Source language. Use `auto` to detect automatically."
                target:
                  type: string
                  enum: [ar, en]
                  description: Target language
                dialect:
                  type: string
                  enum: [gulf, egyptian, levantine, msa]
                  default: msa
                  description: "Target dialect for Arabic output"
                tone:
                  type: string
                  enum: [formal, casual, social_media]
                  default: formal
                  description: Translation tone
                platform:
                  type: string
                  enum: [youtube, instagram, twitter, facebook]
                  description: Source platform for social media tone context
                metadata:
                  type: object
                  description: Arbitrary key-value metadata
            example:
              text: "Hello, how are you?"
              source: "en"
              target: "ar"
              dialect: "gulf"
              tone: "casual"
      responses:
        "200":
          description: Translation result
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Provider:
              $ref: "#/components/headers/X-NAWA-Provider"
            X-NAWA-Cache:
              $ref: "#/components/headers/X-NAWA-Cache"
            X-NAWA-Balance:
              $ref: "#/components/headers/X-NAWA-Balance"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateSuccessResponse"
              examples:
                en_to_gulf:
                  summary: English to Gulf Arabic (casual)
                  value:
                    success: true
                    result:
                      id: trn_nw_pon1yom9bkfe
                      object: translation
                      text: "Hello, how are you?"
                      translated_text: "هلا، كيف حالك؟"
                      source_language: en
                      target_language: ar
                      source_dialect: null
                      target_dialect: gulf
                      tone: casual
                      provider: allam
                      model: sdaia/allam-1-13b-instruct
                      fallback_used: false
                      cached: false
                      cost_usd: 0.005
                      credits_used: 5
                    errors: []
                    request_id: req_nw_4c11w71e44cb
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /detect:
    post:
      operationId: detectLanguage
      summary: Detect language and dialect
      description: |
        Detect language, dialect, script, and text direction from any text input.
        Uses local NAGL modules only -- no external AI call. Returns in under 100ms.
      tags: [Detection]
      x-nawa-cost: "$0.002"
      x-nawa-cache: true
      x-nawa-free: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 5000
                  description: The text to detect
                  examples:
                    - "وش رايكم بالمحتوى الجديد؟"
                    - "This is a great video"
            example:
              text: "وش رايكم بالمحتوى الجديد؟"
      responses:
        "200":
          description: Detection result
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Cache:
              $ref: "#/components/headers/X-NAWA-Cache"
            X-NAWA-Balance:
              $ref: "#/components/headers/X-NAWA-Balance"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectSuccessResponse"
              examples:
                gulf_arabic:
                  summary: Gulf Arabic detection
                  value:
                    success: true
                    result:
                      id: det_nw_pon1yom9bkfe
                      object: detection
                      text: "وش رايكم بالمحتوى الجديد؟"
                      language: ar
                      dialect: gulf
                      dialect_confidence: 0.95
                      script: arabic
                      text_direction: rtl
                      word_count: 4
                      fallback_used: false
                      cost_usd: 0.002
                      credits_used: 2
                      cached: false
                    errors: []
                    request_id: req_nw_det1a2b3c4d5e
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderate:
    post:
      operationId: moderateContent
      summary: Moderate content
      description: |
        Dialect-aware Arabic content moderation. Understands profanity, slang, and
        offensive language differences across Gulf, Egyptian, Levantine, and MSA Arabic.
        Falls back to Claude Haiku 4.5 if ALLaM is unavailable.
      tags: [Moderation]
      x-nawa-cost: "$0.004"
      x-nawa-cache: true
      x-nawa-free: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 5000
                  description: The text to moderate
                  examples:
                    - "هذا محتوى رائع جدا"
                strictness:
                  type: string
                  enum: [low, medium, high]
                  default: medium
                  description: "Moderation strictness. low: severe only. medium: moderate+severe. high: all problematic."
                context:
                  type: string
                  description: "Where the text appears (e.g. youtube comment, product review)"
                platform:
                  type: string
                  enum: [youtube, instagram, twitter, facebook]
                  description: Source platform
            example:
              text: "هذا محتوى رائع جدا"
              strictness: "medium"
      responses:
        "200":
          description: Moderation result
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Provider:
              $ref: "#/components/headers/X-NAWA-Provider"
            X-NAWA-Cache:
              $ref: "#/components/headers/X-NAWA-Cache"
            X-NAWA-Balance:
              $ref: "#/components/headers/X-NAWA-Balance"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerateSuccessResponse"
              examples:
                safe_content:
                  summary: Safe Arabic content
                  value:
                    success: true
                    result:
                      id: mod_nw_pon1yom9bkfe
                      object: moderation
                      text: "هذا محتوى رائع جدا"
                      is_safe: true
                      verdict: safe
                      flags: []
                      severity: none
                      severity_score: 0.0
                      language: ar
                      dialect: gulf
                      categories:
                        profanity: false
                        hate_speech: false
                        harassment: false
                        sexual: false
                        spam: false
                        self_harm: false
                        violence: false
                      category_scores:
                        profanity: 0.01
                        hate_speech: 0.00
                        harassment: 0.02
                        sexual: 0.00
                        spam: 0.05
                        self_harm: 0.00
                        violence: 0.01
                      flagged_terms: []
                      cleaned_text: null
                      model: nagl-v1
                      provider: allam
                      fallback_used: false
                      cached: false
                      cost_usd: 0.004
                      credits_used: 4
                    errors: []
                    request_id: req_nw_mod1a2b3c4d5e
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /rubric/classify:
    post:
      operationId: rubricClassify
      summary: Classify with custom rubric
      description: |
        Classify text against a user-defined rubric. Define your own categories and
        scoring criteria for domain-specific classification.
      tags: [Classification]
      x-nawa-cost: "$0.003"
      x-nawa-cache: true
      x-nawa-free: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, rubric]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 5000
                  description: The comment text to classify
                  examples:
                    - "وين الترجمة العربية؟ مافهمت شي"
                rubric:
                  type: object
                  required: [categories]
                  properties:
                    categories:
                      type: array
                      minItems: 1
                      maxItems: 20
                      items:
                        type: string
                      description: List of category names to classify against
                    descriptions:
                      type: object
                      additionalProperties:
                        type: string
                      description: Category descriptions to guide the model
                platform:
                  type: string
                  enum: [youtube, instagram, twitter, facebook]
                  description: Source platform for context
            example:
              text: "وين الترجمة العربية؟ مافهمت شي"
              rubric:
                categories: ["translation_request", "technical_issue", "content_feedback", "off_topic"]
                descriptions:
                  translation_request: "User is asking for subtitles or translation"
                  technical_issue: "Audio, video, or playback problems"
                  content_feedback: "Comments about the content quality"
                  off_topic: "Not related to the video"
              platform: "youtube"
      responses:
        "200":
          description: Rubric classification result
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Provider:
              $ref: "#/components/headers/X-NAWA-Provider"
            X-NAWA-Cache:
              $ref: "#/components/headers/X-NAWA-Cache"
            X-NAWA-Balance:
              $ref: "#/components/headers/X-NAWA-Balance"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RubricSuccessResponse"
              examples:
                translation_request:
                  summary: Gulf Arabic translation request
                  value:
                    success: true
                    result:
                      text: "وين الترجمة العربية؟ مافهمت شي"
                      category: translation_request
                      category_confidence: 0.94
                      scores:
                        translation_request: 0.94
                        technical_issue: 0.03
                        content_feedback: 0.02
                        off_topic: 0.01
                      dialect: gulf
                      dialect_confidence: 0.91
                      language: ar
                      model: nagl-v1
                      cached: false
                    errors: []
                    request_id: req_rub123abc456
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /comments/{id}/reply:
    post:
      operationId: generateReply
      summary: Generate reply to comment
      description: |
        Generate a culturally-aware, dialect-matched reply to an Arabic comment.
        Replies match the commenter's dialect and are contextually appropriate.
      tags: [Reply]
      x-nawa-cost: "$0.008"
      x-nawa-cache: true
      x-nawa-free: false
      parameters:
        - name: id
          in: path
          required: true
          description: The comment ID to reply to
          schema:
            type: string
            examples:
              - "cmt_abc123"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tone:
                  type: string
                  enum: [friendly, professional, casual, formal]
                  default: friendly
                  description: Reply tone
                max_length:
                  type: integer
                  minimum: 1
                  maximum: 2000
                  default: 500
                  description: Maximum reply length in characters
                context:
                  type: string
                  description: Additional context about the channel or video
                language:
                  type: string
                  enum: [ar, en, auto]
                  default: auto
                  description: "Force reply language. Default: auto (matches commenter's language)."
            example:
              tone: "friendly"
              context: "Tech review channel focused on smartphones"
      responses:
        "200":
          description: Generated reply
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Provider:
              $ref: "#/components/headers/X-NAWA-Provider"
            X-NAWA-Cache:
              $ref: "#/components/headers/X-NAWA-Cache"
            X-NAWA-Balance:
              $ref: "#/components/headers/X-NAWA-Balance"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplySuccessResponse"
              examples:
                gulf_reply:
                  summary: Friendly reply to Gulf Arabic question
                  value:
                    success: true
                    result:
                      comment_id: cmt_abc123
                      reply_text: "إن شاء الله الجزء الثاني قريب! تابعنا عشان ما يفوتك 🔔"
                      reply_dialect: gulf
                      tone: friendly
                      original_intent: question
                      original_dialect: gulf
                    errors: []
                    request_id: req_rep789xyz012
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /report:
    post:
      operationId: generateReport
      summary: Generate audience intelligence report
      description: |
        Generate a structured audience intelligence report from an array of comments.
        Returns markdown and parsed JSON sections. Pro tier includes additional sections
        (repeat commenter analysis, content brief, cross-video narrative tracking).

        Reports open with a TL;DR verdict, use plain-English section titles, and tag
        every percentage as COUNT (exact from data) or ESTIMATE (analyst judgement).
        Any percentage the model leaves untagged is stamped UNVERIFIED by post-processing.

        Requires a live API key. Free/sandbox keys are blocked (minimum cost is 500 credits).
        Rate limited to 5 reports per minute and 20 reports per day.
      tags: [Intelligence]
      x-nawa-cost: "$0.50 (basic) / $1.50 (pro)"
      x-nawa-cache: false
      x-nawa-free: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comments]
              properties:
                comments:
                  type: array
                  minItems: 10
                  maxItems: 500
                  items:
                    type: object
                    required: [text]
                    properties:
                      text:
                        type: string
                        description: Comment text content
                      author:
                        type: string
                        description: Comment author name or handle
                      likes:
                        type: integer
                        description: Like/upvote count
                      created_at:
                        type: string
                        format: date-time
                        description: Comment creation timestamp
                  description: Array of comments to analyze (10-500)
                tier:
                  type: string
                  enum: [basic, pro]
                  default: basic
                  description: |
                    Report tier. Basic (500 credits, $0.50): 8 sections.
                    Pro (1500 credits, $1.50): 10 sections with repeat commenter
                    analysis, content brief, and cross-video tracking.
                title:
                  type: string
                  description: Video or content title for context
                  examples:
                    - "How to Build a YouTube Community in 2026"
                channel_context:
                  type: string
                  description: Optional channel description or context for more targeted analysis
            example:
              comments:
                - text: "This is exactly what I needed to hear, thank you!"
                  author: "@grateful_viewer"
                  likes: 42
                - text: "Can you do a follow-up on the Arabic market?"
                  author: "@mena_fan"
                  likes: 18
                - text: "I disagree with your take on algorithm changes"
                  author: "@skeptic_99"
                  likes: 7
              tier: "pro"
              title: "YouTube Algorithm Deep Dive 2026"
      responses:
        "200":
          description: Intelligence report generated
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-NAWA-Provider:
              $ref: "#/components/headers/X-NAWA-Provider"
            X-NAWA-Latency:
              $ref: "#/components/headers/X-NAWA-Latency"
            X-NAWA-Tier:
              schema:
                type: string
                enum: [basic, pro]
              description: Report tier that was generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSuccessResponse"
              examples:
                pro_report:
                  summary: Pro tier intelligence report
                  value:
                    type: success
                    data:
                      id: "rpt_nw_a1b2c3d4e5f67890"
                      object: intelligence_report
                      tier: pro
                      report_markdown: "## TL;DR\n**Your audience is growing but fragile...**\n\n## I. What Happened\n..."
                      sections:
                        tldr: "**Your audience is growing but fragile...**"
                        executive_summary: "| Metric | Value |..."
                        clusters: "### Fear-Driven Workers ESCALATING ..."
                        narratives: "| Narrative | Strength (%) | ..."
                        sentiment: "| Sentiment | Count | % |..."
                        headline_finding: "**The One Finding That Matters:** ..."
                        top_commenters: "| Rank | Handle | Likes | ..."
                        spam_detected: "No coordinated spam detected."
                        recommendations: "1. **Engage your superfans directly**..."
                        channel_health: "| Signal | Status | Note | ..."
                        repeat_commenters: "| Handle | Comment Count | ..."
                        content_brief: "### Episode Concepts ..."
                      comments_analyzed: 150
                      cost_usd: 1.50
                      credits_used: 1500
                    request_id: "req_nw_a1b2c3d4e5f67890abcdef12"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /feedback:
    post:
      operationId: submitFeedback
      summary: Submit classification feedback
      description: |
        Submit feedback on a classification result to improve NAWA's accuracy.
        Free for all tiers. Used for RLHF-based model improvement.
      tags: [Feedback]
      x-nawa-cost: "Free"
      x-nawa-cache: false
      x-nawa-free: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
            example:
              request_id: "req_abc123def456"
              field: "dialect"
              expected_value: "levantine"
              comment: "This is Lebanese Arabic, not Gulf"
      responses:
        "200":
          description: Feedback accepted
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
